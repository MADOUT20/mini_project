services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chaosfaction-backend
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - .env.vps
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      ENVIRONMENT: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://127.0.0.1:8000}
    container_name: chaosfaction-frontend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.vps
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://127.0.0.1:8000}
    depends_on:
      - backend
